<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select name="city-select" id="city-select">
        <option value="">See local time in..</option>
        <option value="current">your current location 📍</option>
        <option value="Australia/Melbourne">Melbourne</option>
        <option value="America/New_York">New York</option>
        <option value="Asia/Tokyo">Tokyo</option>
      </select>
      <main>
        <div class="city-display" id="jakarta">
          <div>
            <h2>Jakarta 🇮🇩</h2>
            <div class="date"></div>
          </div>
          <div class="time-display"></div>
        </div>
        <div class="city-display" id="amsterdam">
          <div>
            <h2>Amsterdam 🇳🇱</h2>
            <div class="date"></div>
          </div>
          <div class="time-display"></div>
        </div>
        <div class="city-display" id="cape-verde">
          <div>
            <h2>Cape Verde 🇨🇻</h2>
            <div class="date"></div>
          </div>
          <div class="time-display"></div>
        </div>
      </main>
    </div>
    <footer>
      This project is coded by
      <a
        href="https://github.com/tikameutia"
        target="_blank"
        rel="noopener noreferrer"
      >
        Tika Meutia Lubis</a
      >
      and is
      <a href="https://github.com/tikameutia/world-clock" target="_blank"
        >open-sourced on GitHub</a
      >
    </footer>
    <script src="src/app.js"></script>
  </body>
</html>
