<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select name="city-select" id="city-select">
        <option value="">Select a city</option>
        <option value="jakarta">Jakarta 🇮🇩</option>
        <option value="denpasar">Denpasar 🏝</option>
        <option value="lelystad">Lelystad 🇳🇱</option>
        <option value="osaka">Osaka 🇯🇵</option>
      </select>
      <main>
        <div class="city-display">
          <h2 id="city">Jakarta 🇮🇩</h2>
          <div id="date">Tue 19 May</div>
        </div>
        <div class="time-display">02:24:09 AM</div>
      </main>
    </div>
    <footer>
      This project is coded by Tika Meutia Lubis and is
      <a href="https://github.com/tikameutia/world-clock" target="_blank"
        >open-sourced on GitHub</a
      >
    </footer>
    <script src="src/app.js"></script>
  </body>
</html>
